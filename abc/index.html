<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ABC Chant</title>
<style>
body{font-family:Arial,sans-serif;background:#fff8f0;margin:0;padding:22px;line-height:1.7}
.wrap{max-width:760px;margin:0 auto;background:white;border-radius:20px;padding:24px;box-shadow:0 4px 14px rgba(0,0,0,.14)}
h1{text-align:center;font-size:48px;margin:8px 0}
.sub{text-align:center;font-size:22px;font-weight:bold}
.icons{text-align:center;font-size:46px;margin:14px 0}
.cover{display:block;max-width:100%;border-radius:14px;margin:18px auto}
audio{width:100%;margin:18px 0}
.title{text-align:center;font-size:28px;font-weight:bold;margin-top:10px}
.lyrics{font-size:22px;white-space:pre-line;text-align:center}
</style>
</head>
<body>
<div class="wrap">
<h1>A B C</h1>
<div class="sub">A for Apple • B for Ball • C for Cat</div>
<div class="icons">🍎 🏀 🐱</div>
<img class="cover" src="cover.png" alt="ABC cover">
<div class="title">🎵 ABC Chant</div>
<audio controls preload="metadata">
<source src="abcchant.mp3" type="audio/mpeg">
Your browser does not support audio.
</audio>
<div class="lyrics">Hello, hello!
Let's learn today!

A for Apple!
Apple, apple!

B for Ball!
Ball, ball!

C for Cat!
Cat, cat!

One, two, three!
A! B! C!

Apple!
Ball!
Cat!</div>
</div>
</body>
</html>
