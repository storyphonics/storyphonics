<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VWX Chant</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      background: #ffffff;
      color: #000000;
      font-family: "Fredoka", sans-serif;
    }
    main {
      width: min(100%, 720px);
      margin: 0 auto;
      padding: 24px 18px 48px;
      text-align: center;
    }
    h1 {
      margin: 0 0 22px;
      font-size: clamp(36px, 10vw, 58px);
      font-weight: 700;
      line-height: 1.15;
    }
    .cover {
      display: block;
      width: 100%;
      height: auto;
      margin: 0 auto 24px;
    }
    audio {
      display: block;
      width: 100%;
      margin: 0 auto 30px;
    }
    .lyrics {
      margin: 0;
      white-space: pre-wrap;
      overflow-wrap: break-word;
      font-family: "Fredoka", sans-serif;
      font-size: clamp(22px, 6vw, 30px);
      font-weight: 700;
      line-height: 1.8;
      color: #000000;
      text-align: center;
    }
  </style>
</head>
<body>
  <main>
    <h1>VWX Chant</h1>
    <img class="cover" src="cover.png" alt="VWX Story Phonics cover">
    <audio controls preload="metadata">
      <source src="vwxchant.mp3" type="audio/mpeg">
      Your browser does not support the audio element.
    </audio>
    <div class="lyrics">Clap, clap, clap now!
Let&#x27;s sing together!

V for Van!
Van, van!

W for Watch!
Watch, watch!

X for Box!
Box, box!

Come on Let&#x27;s go!
V! W! X!

Van!
Watch!
Box!
</div>
  </main>
</body>
</html>
