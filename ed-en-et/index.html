<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ED EN ET</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
    }
    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      background: #ffffff;
      color: #000000;
      font-family: "Fredoka", sans-serif;
    }
    body {
      overflow-y: auto;
    }
    main {
      width: min(100%, 720px);
      margin: 0 auto;
      padding: 24px 18px 56px;
      text-align: center;
    }
    h1 {
      margin: 0 0 22px;
      font-size: clamp(36px, 10vw, 58px);
      line-height: 1.15;
      font-weight: 700;
      color: #000000;
    }
    .cover {
      display: block;
      width: 100%;
      height: auto;
      margin: 0 auto 24px;
      border-radius: 16px;
    }
    audio {
      display: block;
      width: 100%;
      margin: 0 auto 28px;
    }
    .lyrics {
      margin: 0;
      padding: 0;
      white-space: pre-wrap;
      overflow-wrap: break-word;
      font-family: "Fredoka", sans-serif;
      font-size: clamp(22px, 6vw, 30px);
      font-weight: 700;
      line-height: 1.8;
      text-align: center;
      color: #000000;
    }
  </style>
</head>
<body>
  <main>
    <h1>ED EN ET</h1>
    <img class="cover" src="cover.png" alt="ED EN ET cover">
    <audio controls preload="metadata">
      <source src="ed-en-etchant.mp3" type="audio/mpeg">
      Your browser does not support the audio element.
    </audio>
    <div class="lyrics">Clap, clap, clap now!
Let’s sing together!

Bed! Bed! Bed!
Red! Red! Red!
Fed! Fed! Fed!

Hen! Hen! Hen!
Pen! Pen! Pen!
Ten! Ten! Ten!

Jet! Jet! Jet!
Net! Net! Net!
Vet! Vet! Vet!

Bed! Red! Fed!
Hen! Pen! Ten!
Jet! Net! Vet!

Clap, clap, clap!
Great job!</div>
  </main>
</body>
</html>
