<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>What Day Is It?</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
    }
    html, body {
      margin: 0;
      padding: 0;
      background: #ffffff;
      color: #000000;
      font-family: "Fredoka", sans-serif;
    }
    body {
      min-height: 100vh;
      overflow-y: auto;
    }
    main {
      width: min(100%, 760px);
      margin: 0 auto;
      padding: 24px 18px 48px;
      text-align: center;
    }
    h1 {
      margin: 0 0 22px;
      font-size: clamp(34px, 9vw, 56px);
      line-height: 1.15;
      font-weight: 700;
      color: #000000;
    }
    .cover {
      display: block;
      width: 100%;
      height: auto;
      margin: 0 auto 22px;
      border-radius: 14px;
    }
    audio {
      display: block;
      width: 100%;
      margin: 0 auto 28px;
    }
    .lyrics {
      margin: 0;
      padding: 0 4px;
      white-space: pre-wrap;
      overflow-wrap: break-word;
      font-family: "Fredoka", sans-serif;
      font-size: clamp(22px, 6vw, 30px);
      font-weight: 700;
      line-height: 1.8;
      text-align: center;
      color: #000000;
    }
  </style>
</head>
<body>
  <main>
    <h1>What Day Is It?</h1>
    <img class="cover" src="cover.png" alt="What Day Is It? cover">
    <audio controls preload="metadata">
      <source src="whatdayisitchant.mp3" type="audio/mpeg">
      Your browser does not support the audio element.
    </audio>
    <div class="lyrics">What day is it today?
It’s Monday!

What day is it today?
It’s Tuesday!

What day is it today?
It’s Wednesday!

What day is it today?
It’s Thursday!

What day is it today?
It’s Friday!

What day is it today?
It’s Saturday!

What day is it today?
It’s Sunday!</div>
  </main>
</body>
</html>
