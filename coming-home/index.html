<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coming Home</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      background: #ffffff;
      color: #000000;
      font-family: "Fredoka", sans-serif;
    }
    main {
      width: min(100%, 760px);
      margin: 0 auto;
      padding: 24px 18px 48px;
      text-align: center;
    }
    h1 {
      margin: 0 0 22px;
      font-size: clamp(36px, 10vw, 64px);
      line-height: 1.15;
      font-weight: 700;
    }
    .cover {
      display: block;
      width: 100%;
      height: auto;
      margin: 0 auto 24px;
      border-radius: 16px;
    }
    audio {
      display: block;
      width: 100%;
      margin: 0 auto 28px;
    }
    .lyrics {
      margin: 0;
      font-size: clamp(22px, 6vw, 32px);
      line-height: 1.8;
      font-weight: 700;
      color: #000000;
      text-align: center;
      overflow-wrap: anywhere;
    }
  </style>
</head>
<body>
  <main>
    <h1>Coming Home</h1>
    <img class="cover" src="cover.png" alt="Coming Home cover">
    <audio controls preload="metadata">
      <source src="coming-home.mp3" type="audio/mpeg">
      Your browser does not support the audio element.
    </audio>
    <div class="lyrics">Child: Hi, Mom! I’m home.<br><br>
Mom: Hi! Good to see you.</div>
  </main>
</body>
</html>
